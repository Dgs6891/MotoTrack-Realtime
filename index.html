<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoTrack Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --p: #3ecf8e; --d: #1c1c1c; }
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #121212; color: white; }
        header { background: var(--d); color: var(--p); padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        #map { flex: 1; width: 100%; }
        .controls { padding: 20px; background: var(--d); }
        .btn { background: var(--p); border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        .hidden { display: none; }
        #msg-status { margin: 10px 0; color: #aaa; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>MOTOTRACK LIVE - SUPABASE</header>
<div id="map"></div>

<div class="controls">
    <div id="panel-entregador">
        <input type="text" id="nome-user" placeholder="Seu nome (Entregador)">
        <button class="btn" onclick="iniciarRastreio()">ATIVAR GPS E GERAR LINK</button>
    </div>
    <div id="panel-cliente" class="hidden">
        <p id="msg-status">Sinal de GPS ativo...</p>
        <button class="btn" style="background:#25d366" id="btn-whatsapp">Compartilhar Rastreio</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // CREDENCIAIS ATUALIZADAS (PUBLISHABLE KEY)
    const SB_URL = 'https://ntxnqfscurzswkpxkvft.supabase.co';
    const SB_KEY = 'sb_publishable_vlUyAgSiVsFPFxP7XtdVCg_CHxOd5Rp';  // <--- CHAVE CORRETA
    
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const map = L.map('map').setView([-7.115, -34.863], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let motoIcon = L.marker([0,0]).addTo(map);

    const params = new URLSearchParams(window.location.search);
    const idEntrega = params.get('id');

    if (idEntrega) {
        document.getElementById('panel-entregador').classList.add('hidden');
        document.getElementById('panel-cliente').classList.remove('hidden');
        document.getElementById('btn-whatsapp').classList.add('hidden');

        supabaseClient
            .channel('rastreio')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'entregas', filter: `id=eq.${idEntrega}` }, 
            payload => {
                atualizarPosicao(payload.new.lat, payload.new.lng, payload.new.nome);
            }).subscribe();
    }

    async function iniciarRastreio() {
        const nome = document.getElementById('nome-user').value;
        if(!nome) return alert("Digite seu nome");

        const idUnico = 'ped_' + Math.random().toString(36).substr(2, 9);
        
        const { error } = await supabaseClient.from('entregas').insert([{ id: idUnico, nome: nome, lat: 0, lng: 0 }]);
        if(error) {
            console.error("Erro ao inserir:", error);
            return alert("Erro ao conectar: " + error.message);
        }

        document.getElementById('panel-entregador').classList.add('hidden');
        document.getElementById('panel-cliente').classList.remove('hidden');

        const link = window.location.origin + window.location.pathname + "?id=" + idUnico;
        document.getElementById('btn-whatsapp').onclick = () => {
            window.open(`https://wa.me/?text=Siga minha entrega: ${encodeURIComponent(link)}`);
        };

        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            await supabaseClient.from('entregas').update({ lat: latitude, lng: longitude }).eq('id', idUnico);
            atualizarPosicao(latitude, longitude, nome);
        }, null, { enableHighAccuracy: true });
    }

    function atualizarPosicao(lat, lng, nome) {
        const p = [lat, lng];
        motoIcon.setLatLng(p);
        map.setView(p, 17);
        document.getElementById('msg-status').innerText = `Entregador: ${nome} (Localização atualizada)`;
    }
</script>
</body>
</html>
